<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TSC EasyEcom — Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Outfit', sans-serif;
  background: #F7F9FC;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.login-card {
  background: #fff;
  border: 1px solid #E5E7EB;
  border-radius: 16px;
  padding: 44px 40px;
  width: 100%;
  max-width: 400px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.07);
}

.login-logo {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 28px;
}

.login-logo-icon {
  width: 38px; height: 38px;
  background: #1A56DB;
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  color: #fff;
}

.login-logo-text { display: flex; flex-direction: column; line-height: 1; }
.login-logo-text span:first-child { font-size: 15px; font-weight: 800; color: #0A0F1E; letter-spacing: -0.3px; }
.login-logo-text span:last-child { font-size: 11px; color: #9CA3AF; margin-top: 2px; }

.login-heading { font-size: 22px; font-weight: 800; color: #0A0F1E; letter-spacing: -0.5px; margin-bottom: 6px; }
.login-sub { font-size: 13.5px; color: #6B7280; margin-bottom: 28px; }

.field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
.field label { font-size: 13px; font-weight: 600; color: #374151; }

.field input {
  height: 42px;
  border: 1.5px solid #E5E7EB;
  border-radius: 8px;
  background: #F9FAFB;
  color: #0A0F1E;
  font-family: 'Outfit', sans-serif;
  font-size: 14px;
  padding: 0 14px;
  outline: none;
  transition: all 0.18s;
}
.field input:focus { border-color: #1A56DB; background: #fff; box-shadow: 0 0 0 3px rgba(26,86,219,0.1); }
.field input::placeholder { color: #D1D5DB; }

.error-msg {
  display: none;
  align-items: center;
  gap: 8px;
  background: #FEF2F2;
  border: 1px solid #FECACA;
  border-radius: 8px;
  padding: 10px 14px;
  font-size: 13px;
  color: #DC2626;
  font-weight: 500;
  margin-bottom: 16px;
}
.error-msg.show { display: flex; animation: shake 0.35s ease; }
@keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-5px)} 75%{transform:translateX(5px)} }

.btn-login {
  width: 100%;
  height: 44px;
  background: #1A56DB;
  color: #fff;
  border: none;
  border-radius: 8px;
  font-family: 'Outfit', sans-serif;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.18s;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  margin-top: 4px;
  box-shadow: 0 2px 8px rgba(26,86,219,0.3);
}
.btn-login:hover { background: #1348C5; transform: translateY(-1px); box-shadow: 0 4px 14px rgba(26,86,219,0.4); }
.btn-login:active { transform: translateY(0); }
.btn-login.loading { opacity: 0.8; pointer-events: none; }

.spinner {
  width: 18px; height: 18px;
  border: 2px solid rgba(255,255,255,0.3);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  display: none;
}
.btn-login.loading .spinner { display: block; }
.btn-login.loading .btn-label { display: none; }
@keyframes spin { to { transform: rotate(360deg); } }

.login-footer {
  text-align: center;
  margin-top: 24px;
  padding-top: 20px;
  border-top: 1px solid #F3F4F6;
  font-size: 12px;
  color: #9CA3AF;
}
.login-footer strong { color: #6B7280; font-weight: 600; }
</style>
</head>
<body>

<script>
  if (sessionStorage.getItem('tsc_auth') === 'true') window.location.href = 'index.html';
</script>

<div class="login-card">
  <div class="login-logo">
    <div class="login-logo-icon">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>
    </div>
    <div class="login-logo-text">
      <span>TSC EasyEcom</span>
      <span>Order Management</span>
    </div>
  </div>

  <h1 class="login-heading">Sign in</h1>
  <p class="login-sub">Enter your credentials to continue.</p>

  <div class="error-msg" id="errorMsg">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    <span id="errorText">Invalid credentials.</span>
  </div>

  <div class="field">
    <label>Email Address</label>
    <input type="email" id="emailInput" placeholder="you@company.com" autocomplete="email">
  </div>

  <div class="field">
    <label>Password</label>
    <input type="password" id="passwordInput" placeholder="Enter your password" autocomplete="current-password">
  </div>

  <button class="btn-login" id="loginBtn" onclick="handleLogin()">
    <span class="btn-label">Sign In</span>
    <div class="spinner"></div>
  </button>

  <div class="login-footer">
    Product by <strong>Abhishek Tiwari</strong> · D2C · The Sleep Company
  </div>
</div>

<script>
  const VALID_EMAIL = 'ruta@thesleepcompany.in';
  const VALID_PASS  = 'Ruta@123';

  document.addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });

  function handleLogin() {
    const email = document.getElementById('emailInput').value.trim();
    const pass  = document.getElementById('passwordInput').value;
    const btn   = document.getElementById('loginBtn');
    const err   = document.getElementById('errorMsg');

    err.classList.remove('show');
    btn.classList.add('loading');

    setTimeout(() => {
      if (email === VALID_EMAIL && pass === VALID_PASS) {
        sessionStorage.setItem('tsc_auth', 'true');
        sessionStorage.setItem('tsc_user', email);
        window.location.href = 'index.html';
      } else {
        btn.classList.remove('loading');
        document.getElementById('errorText').textContent =
          !email || !pass ? 'Please enter both email and password.' : 'Incorrect email or password.';
        err.classList.add('show');
        document.getElementById('passwordInput').value = '';
      }
    }, 800);
  }
</script>
</body>
</html>
